name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint backend
        working-directory: backend
        run: |
          npm install
          npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm install
          npm run lint

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-backend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-frontend:latest

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-worker:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-worker:latest

  update-infra-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Akarshak51/gitops
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags
        working-directory: infra
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          NAMESPACE=${{ secrets.DOCKERHUB_USERNAME }}
          
          sed -i "s|image: .*ai-task-backend:.*|image: docker.io/${NAMESPACE}/ai-task-backend:${TAG}|" k8s/backend.yaml
          sed -i "s|image: .*ai-task-frontend:.*|image: docker.io/${NAMESPACE}/ai-task-frontend:${TAG}|" k8s/frontend.yaml
          sed -i "s|image: .*ai-task-worker:.*|image: docker.io/${NAMESPACE}/ai-task-worker:${TAG}|" k8s/worker.yaml

      - name: Commit and push
        working-directory: infra
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add k8s/
          git commit -m "chore: bump image tags to ${{ needs.build-and-push.outputs.image_tag }}" || echo "No changes to commit"
          git push